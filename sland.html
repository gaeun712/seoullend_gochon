<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서울랜드 과학 탐험대</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #fff1f2;
            background-image: radial-gradient(#fecdd3 2px, transparent 2px);
            background-size: 24px 24px;
        }

        .font-jua {
            font-family: 'Jua', sans-serif;
        }

        .screen {
            display: none;
            min-height: 100vh;
        }

        .screen.active {
            display: flex;
        }

        .card-pop {
            transition: transform 0.1s ease;
        }

        .card-pop:active {
            transform: scale(0.96);
        }
    </style>
</head>

<body class="text-slate-800">

<div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-2xl overflow-hidden">

    <!-- 홈 화면 -->
    <div id="screen-home" class="screen active p-6 flex-col justify-center bg-gradient-to-br from-pink-100 via-rose-50 to-white">

        <div class="text-center mb-8">
            <div class="text-7xl mb-4">🎢</div>

            <div class="font-jua text-rose-500 text-lg bg-white px-4 py-2 rounded-full inline-block mb-4 shadow">
                👩‍🔬 가은쌤의 과학수업
            </div>

            <h1 class="font-jua text-5xl text-rose-600 leading-tight mb-3">
                서울랜드<br>과학 탐험대
            </h1>

            <p class="font-bold text-rose-500">
                놀이기구 타고 도장 모으자!
            </p>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-lg border-2 border-rose-100 space-y-4">

            <div>
                <label class="block font-bold text-rose-500 mb-2">몇 반이야?</label>

                <select id="input-cls"
                    class="w-full border-2 border-rose-200 rounded-xl p-3 font-bold">

                    <option value="">반을 선택해줘!</option>
                    <option value="1반">1반</option>
                    <option value="2반">2반</option>
                    <option value="3반">3반</option>
                    <option value="4반">4반</option>
                    <option value="5반">5반</option>
                    <option value="6반">6반</option>
                    <option value="7반">7반</option>
                    <option value="8반">8반</option>
                    <option value="9반">9반</option>
                </select>
            </div>

            <div>
                <label class="block font-bold text-rose-500 mb-2">모둠 이름</label>

                <input
                    type="text"
                    id="input-group"
                    class="w-full border-2 border-rose-200 rounded-xl p-3 font-bold"
                    placeholder="모둠 이름 입력"
                >
            </div>

            <div>
                <label class="block font-bold text-rose-500 mb-2">대표 이름</label>

                <input
                    type="text"
                    id="input-name"
                    class="w-full border-2 border-rose-200 rounded-xl p-3 font-bold"
                    placeholder="이름 입력"
                >
            </div>
        </div>

        <button
            id="btn-start"
            disabled
            class="mt-8 bg-gradient-to-r from-rose-500 to-pink-500 text-white font-jua text-2xl py-4 rounded-2xl opacity-50 cursor-not-allowed"
        >
            탐험 시작하기! 🚀
        </button>
    </div>


    <!-- 미션 맵 -->
    <div id="screen-map" class="screen flex-col bg-slate-50 min-h-screen">

        <div class="bg-gradient-to-r from-rose-500 to-pink-500 text-white p-5 rounded-b-3xl shadow-lg">

            <div class="flex justify-between items-center mb-3">
                <div>
                    <div id="map-team-info" class="text-sm font-bold mb-1"></div>
                    <h2 class="font-jua text-3xl">미션 지도 🗺️</h2>
                </div>

                <div class="bg-white text-rose-500 px-4 py-2 rounded-full font-jua text-2xl shadow">
                    <span id="stamp-count">0</span>/9
                </div>
            </div>

            <div class="bg-white/30 rounded-full h-3 overflow-hidden">
                <div id="progress-bar" class="bg-yellow-300 h-3 rounded-full w-0 transition-all"></div>
            </div>
        </div>

        <div class="p-4 flex-1">
            <div id="mission-grid" class="grid grid-cols-3 gap-3"></div>
        </div>
    </div>


    <!-- 미션 상세 -->
    <div id="screen-detail" class="screen flex-col bg-slate-50 min-h-screen">

        <div class="bg-white p-4 border-b flex items-center gap-3 sticky top-0">
            <button id="btn-back" class="text-2xl">⬅️</button>

            <div>
                <div id="detail-tag" class="text-sm text-rose-500 font-bold"></div>
                <h2 id="detail-title" class="font-jua text-2xl"></h2>
            </div>
        </div>

        <div class="p-5 flex-1 overflow-y-auto pb-32">

            <div class="bg-white rounded-2xl p-5 border-2 border-blue-200 mb-5 shadow-sm">
                <h3 class="font-jua text-xl text-blue-600 mb-3">👀 관찰 미션</h3>
                <p id="detail-observation" class="font-bold"></p>
            </div>

            <div class="bg-white rounded-2xl p-5 border-2 border-purple-200 mb-5 shadow-sm">
                <h3 class="font-jua text-xl text-purple-600 mb-3">✍️ 답변 작성</h3>

                <textarea
                    id="detail-answer"
                    class="w-full h-32 border-2 border-purple-100 rounded-xl p-4 resize-none"
                    placeholder="관찰한 내용을 자유롭게 적어줘!"
                ></textarea>

                <div class="flex justify-between mt-2 text-sm">
                    <span class="text-rose-500 font-bold">10자 이상 입력!</span>
                    <span><span id="char-count">0</span>/10</span>
                </div>
            </div>

            <button
                id="btn-reveal"
                disabled
                class="w-full bg-slate-200 text-slate-500 py-4 rounded-2xl font-bold mb-5"
            >
                🔒 답변을 10자 이상 쓰면 열려요
            </button>

            <div id="detail-explanation-box" class="hidden bg-indigo-50 border-2 border-indigo-200 rounded-2xl p-5">
                <h3 class="font-jua text-xl text-indigo-600 mb-3">💡 과학 개념</h3>

                <p id="detail-explanation" class="leading-relaxed mb-4"></p>

                <div id="detail-keywords" class="flex flex-wrap gap-2"></div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t p-4">
            <button
                id="btn-stamp"
                disabled
                class="w-full bg-gradient-to-r from-rose-500 to-pink-500 text-white font-jua text-2xl py-4 rounded-2xl opacity-50"
            >
                🔖 도장 받기!
            </button>
        </div>
    </div>

</div>

<script>

const MISSIONS = [
    {
        id: 0,
        title: "블랙홀 2000",
        tag: "에너지 전환",
        icon: "🎢",
        observation: "가장 빠르게 느껴지는 순간은 언제? 올라갈 때 vs 내려갈 때",
        explanation: "높은 곳에 있는 물체는 아래로 내려올 수 있는 능력, 즉 '위치에너지'를 가지고 있어. 롤러코스터가 내려오면서 이 위치에너지가 빠르게 달리는 힘인 '운동에너지'로 바뀌는 거야. 그래서 가장 낮은 지점에서 속도가 제일 빨라. 모터 없이도 처음 높이 하나로 끝까지 달릴 수 있는 이유가 바로 이거야.",
        keywords: ["위치에너지", "운동에너지", "에너지 전환"]
    },

    {
        id: 1,
        title: "은하열차 888",
        tag: "관성과 구심력",
        icon: "🚀",
        observation: "루프에서 거꾸로 뒤집혔을 때 몸이 어떤 느낌?",
        explanation: "물체는 원래 하던 방향으로 계속 가려는 성질이 있는데, 이걸 '관성'이라고 해. 빠르게 달리는 열차 안의 내 몸도 앞으로 계속 나아가려 하는데, 루프에서는 그 힘이 나를 좌석(원의 중심 방향) 쪽으로 눌러줘. 이렇게 원을 그리며 돌 때 중심 방향으로 당기는 힘을 '구심력'이라고 해. 속도가 충분하면 이 구심력이 중력보다 커서 뒤집혀도 안 떨어지는 거야.",
        keywords: ["관성", "구심력"]
    },

    {
        id: 2,
        title: "킹바이킹",
        tag: "진자 운동",
        icon: "⚓",
        observation: "왕복 시간을 손으로 세어봐 (1, 2, 3...)",
        explanation: "진자(줄에 매달려 흔들리는 물체)는 크게 흔들리든 작게 흔들리든 한 번 왕복하는 시간이 거의 같아. 이걸 '등시성'이라고 해. 왕복 시간은 줄의 길이에만 달려 있거든. 갈릴레오가 교회 천장 램프를 보고 발견한 이 원리로 나중에 진자시계가 만들어졌어. 바이킹에서 조용히 왕복 시간을 세어보면 처음이랑 끝이 비슷하다는 걸 느낄 수 있어!",
        keywords: ["진자운동", "주기"]
    },

    {
        id: 3,
        title: "급류타기",
        tag: "힘과 가속도",
        icon: "💦",
        observation: "보트가 물에 부딪힐 때 물이 튀는 이유는?",
        explanation: "움직이는 물체는 무거울수록, 빠를수록 충돌할 때 더 큰 힘을 만들어. 사람이 많이 탈수록 보트가 더 무거워지고, 무거울수록 더 빠르게 내려와. 그 보트가 물과 부딪힐 때 물을 더 세게 밀어내는 거야. 힘이 클수록 물도 더 멀리 튀는 건 당연하겠지? 앞자리에 앉을수록 물을 정면으로 맞는 이유도 같은 원리야.",
        keywords: ["중력", "힘", "가속도"]
    },

    {
        id: 4,
        title: "샷드롭",
        tag: "무중력 체험",
        icon: "🗼",
        observation: "떨어지는 순간 몸이 가벼워지는 느낌? 무거워지는 느낌?",
        explanation: "지구는 모든 물체를 아래로 당기는데, 이 힘이 '중력'이야. 낙하하는 동안 나도, 발판도, 탑승 기구도 모두 똑같이 중력을 받아서 함께 떨어지고 있어. 이렇게 중력만 받으며 떨어지는 걸 '자유낙하'라고 해. 이 순간 발판이 내 발을 받쳐주는 힘이 사라지면서 몸이 둥둥 뜨는 것처럼 느껴지는 거야. 우주정거장도 지구를 향해 자유낙하 중이라서 우주비행사들이 무중력을 경험하는 거야.",
        keywords: ["중력", "자유낙하", "무중력"]
    },

    {
        id: 5,
        title: "엑스플라이어",
        tag: "원운동",
        icon: "🌀",
        observation: "회전할 때 몸이 왜 바깥으로 쏠릴까?",
        explanation: "관성 때문에 내 몸은 원래 직선으로 쭉 나아가고 싶어 해. 그런데 줄이 나를 중심 쪽으로 잡아당기니까 어쩔 수 없이 원을 그리게 되는 거야. 이때 중심 방향으로 당기는 힘이 '구심력'이고, 빠를수록 이 힘이 더 강하게 필요해. 내 몸이 바깥으로 쏠리는 느낌은 직선으로 가려는 관성 때문이야. 회전이 빠를수록 줄이 더 기울어지는 것도 이 때문이야.",
        keywords: ["관성", "원운동", "구심력"]
    },

    {
        id: 6,
        title: "앨리스 원더하우스",
        tag: "빛과 착시",
        icon: "🃏",
        observation: "눈이 틀렸을까, 뇌가 틀렸을까?",
        explanation: "눈은 빛을 받아들이는 역할만 해. 실제로 '본다'는 건 뇌가 그 정보를 해석하는 거야. 뇌는 과거 경험을 바탕으로 '이럴 거야'라고 예측해서 해석하는데, 착시 체험관은 그 예측을 의도적으로 빗나가도록 설계되어 있어. 빛이 반사되거나 굴절되는 방향을 교란시켜서 뇌가 엉뚱한 결론을 내리게 만드는 거야. 틀린 건 눈이 아니라 뇌의 해석이야.",
        keywords: ["착시", "빛의 반사", "시각"]
    },

    {
        id: 7,
        title: "쥬라기랜드",
        tag: "진화의 흔적",
        icon: "🦖",
        observation: "공룡이 멸종한 이유는 무엇일까?",
        explanation: "약 6600만 년 전 소행성 충돌로 급격한 기후 변화가 일어나면서 대부분의 공룡이 멸종했어. 하지만 깃털 달린 수각류 공룡 일부가 살아남아서 오늘날의 새로 진화했어. 오랜 시간 동안 환경에 적응하며 생김새와 기능이 조금씩 변해가는 것을 '진화'라고 해. 화석은 그 진화의 흔적을 기록한 증거야. 지구에 다양한 생물이 존재하는 것 자체가 수억 년에 걸친 진화의 결과야.",
        keywords: ["멸종", "진화", "화석"]
    },

    {
        id: 8,
        title: "기상 관측가",
        tag: "열섬 현상",
        icon: "☁️",
        observation: "장소마다 온도가 다른 이유는?",
        explanation: "태양에서 오는 열은 '복사열'이라는 방식으로 전달돼. 어두운 색일수록 이 복사열을 잘 흡수하고, 밝은 색일수록 반사해. 아스팔트는 어두운 색이라 열을 많이 흡수하고, 잔디는 수분이 증발하면서 열을 식혀줘. 도시에 아스팔트와 콘크리트가 많아지면 열이 더 많이 흡수·저장되면서 도시 전체 온도가 주변보다 높아지는데, 이걸 '열섬 효과'라고 해.",
        keywords: ["열섬효과", "복사열", "열흡수"]
    }
];

let appState = {
    cls: "",
    group: "",
    name: "",
    stamps: {}
};

let currentMissionId = null;


const screens = {
    home: document.getElementById('screen-home'),
    map: document.getElementById('screen-map'),
    detail: document.getElementById('screen-detail')
};


const inputs = {
    cls: document.getElementById('input-cls'),
    group: document.getElementById('input-group'),
    name: document.getElementById('input-name')
};


const btnStart = document.getElementById('btn-start');
const mapGrid = document.getElementById('mission-grid');
const stampCountEl = document.getElementById('stamp-count');
const progressBar = document.getElementById('progress-bar');
const mapTeamInfo = document.getElementById('map-team-info');

const detailEls = {
    title: document.getElementById('detail-title'),
    tag: document.getElementById('detail-tag'),
    observation: document.getElementById('detail-observation'),
    answer: document.getElementById('detail-answer'),
    charCount: document.getElementById('char-count'),
    btnReveal: document.getElementById('btn-reveal'),
    expBox: document.getElementById('detail-explanation-box'),
    expText: document.getElementById('detail-explanation'),
    keywords: document.getElementById('detail-keywords'),
    btnStamp: document.getElementById('btn-stamp')
};


function showScreen(name) {
    Object.values(screens).forEach(screen => {
        screen.classList.remove('active');
    });

    screens[name].classList.add('active');
}


function checkInputs() {

    const isValid =
        inputs.cls.value !== '' &&
        inputs.group.value.trim().length > 0 &&
        inputs.name.value.trim().length > 0;


    if (isValid) {
        btnStart.disabled = false;

        btnStart.classList.remove(
            'opacity-50',
            'cursor-not-allowed'
        );

    } else {

        btnStart.disabled = true;

        btnStart.classList.add(
            'opacity-50',
            'cursor-not-allowed'
        );
    }
}


inputs.cls.addEventListener('change', checkInputs);
inputs.group.addEventListener('input', checkInputs);
inputs.name.addEventListener('input', checkInputs);


btnStart.addEventListener('click', () => {

    appState.cls = inputs.cls.value;
    appState.group = inputs.group.value;
    appState.name = inputs.name.value;

    renderMap();
    showScreen('map');
});


function renderMap() {

    mapTeamInfo.textContent = `${appState.cls} | ${appState.group}`;

    const stampCount = Object.keys(appState.stamps).length;

    stampCountEl.textContent = stampCount;

    progressBar.style.width = `${(stampCount / MISSIONS.length) * 100}%`;


    mapGrid.innerHTML = '';


    MISSIONS.forEach(mission => {

        const done = appState.stamps[mission.id];

        const button = document.createElement('button');

        button.className = `
            aspect-square
            rounded-2xl
            bg-white
            border-2
            p-2
            shadow
            card-pop
            relative
            ${done ? 'border-rose-400 bg-rose-50' : 'border-slate-200'}
        `;


        button.innerHTML = `
            <div class="text-4xl mb-2">${mission.icon}</div>
            <div class="font-jua text-sm">${mission.title}</div>
            ${done ? '<div class="absolute inset-0 flex items-center justify-center text-6xl">🔖</div>' : ''}
        `;


        button.addEventListener('click', () => {
            openMission(mission.id);
        });


        mapGrid.appendChild(button);
    });
}


function openMission(id) {

    currentMissionId = id;

    const mission = MISSIONS.find(m => m.id === id);


    detailEls.title.textContent = mission.title;
    detailEls.tag.textContent = mission.tag;
    detailEls.observation.textContent = mission.observation;
    detailEls.expText.textContent = mission.explanation;


    detailEls.answer.value = '';
    detailEls.charCount.textContent = '0';


    detailEls.expBox.classList.add('hidden');


    detailEls.keywords.innerHTML = mission.keywords.map(keyword => `
        <span class="px-3 py-1 bg-white border border-indigo-200 rounded-full text-sm font-bold text-indigo-600">
            #${keyword}
        </span>
    `).join('');


    detailEls.btnReveal.disabled = true;
    detailEls.btnReveal.className = 'w-full bg-slate-200 text-slate-500 py-4 rounded-2xl font-bold mb-5';


    detailEls.btnStamp.disabled = true;
    detailEls.btnStamp.classList.add('opacity-50');


    showScreen('detail');
}


// 답변 입력

detailEls.answer.addEventListener('input', () => {

    const text = detailEls.answer.value;

    detailEls.charCount.textContent = text.length;


    if (text.length >= 10) {

        detailEls.btnReveal.disabled = false;

        detailEls.btnReveal.className = 'w-full bg-indigo-500 text-white py-4 rounded-2xl font-bold mb-5';

    } else {

        detailEls.btnReveal.disabled = true;

        detailEls.btnReveal.className = 'w-full bg-slate-200 text-slate-500 py-4 rounded-2xl font-bold mb-5';
    }
});


// 과학 개념 열기

detailEls.btnReveal.addEventListener('click', () => {

    detailEls.expBox.classList.remove('hidden');

    detailEls.btnStamp.disabled = false;

    detailEls.btnStamp.classList.remove('opacity-50');
});


// 도장 받기

detailEls.btnStamp.addEventListener('click', () => {

    appState.stamps[currentMissionId] = true;

    alert('🔖 도장을 획득했어!');

    renderMap();

    showScreen('map');
});


// 뒤로가기

document.getElementById('btn-back').addEventListener('click', () => {
    showScreen('map');
});

</script>

</body>
</html>
